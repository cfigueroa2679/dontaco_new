<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Redirigiendo a WhatsApp...</title>
    <script>
      window.onload = function () {
        const url = new URLSearchParams(window.location.search).get("url");
        if (url) {
          window.location.href = url;
        }
      };
    </script>
  </head>
  <body>
    <p>Abriendo WhatsApp...</p>
  </body>
</html>
